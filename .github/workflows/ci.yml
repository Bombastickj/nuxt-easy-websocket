name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm i -g --force corepack@latest && corepack enable

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm i -g --force corepack@latest && corepack enable

      - name: Install dependencies
        run: npm install

      - name: Install Playwright
        run: npm playwright-core install chromium

      - name: Playground prepare
        run: npm run dev:prepare

      - name: Test
        run: npm run test
